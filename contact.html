<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0f1115;
  color:#eaeaea;
  padding:20px;
}

.box{
  max-width:600px;
  margin:auto;
  background:#161a24;
  padding:20px;
  border-radius:14px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#0f1115;
  color:white;
}

button{
  padding:10px;
  background:#ff4757;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

a{
  color:#ff4757;
  text-decoration:none;
}
</style>
</head>

<body>

<a href="index.html">← Home</a>

<div class="box">
<h1>Contact Us</h1>

<form onsubmit="event.preventDefault();alert('Message sent (demo)')">
<input placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea rows="5" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form>

</div>

</body>
</html>
