<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal NewsHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0f1115;
  color:#eaeaea;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  position:sticky;
  top:0;
  background:rgba(20,22,30,0.85);
  backdrop-filter:blur(12px);
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  opacity:0.8;
}

nav a:hover{opacity:1;}

.hero{
  padding:50px 25px;
  background:linear-gradient(135deg,#1c1f2a,#0f1115);
}

.hero h1{
  font-size:40px;
  margin:0;
}

.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:25px;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr;}
}

.card{
  background:#161a24;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

a{
  text-decoration:none;
  color:inherit;
}

.sidebar{
  background:#161a24;
  padding:15px;
  border-radius:14px;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<nav>
  <b>Nepal NewsHub</b>
  <div>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Breaking News in Nepal</h1>
</div>

<div class="container">

<div>

<a href="article1.html">
<div class="card">
<img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20">
<div class="card-content">
<h3>Nepal Cricket Team Qualifies for Asia Cup</h3>
</div>
</div>
</a>

<a href="article2.html">
<div class="card">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<div class="card-content">
<h3>Kathmandu AI Startup Boom</h3>
</div>
</div>
</a>

</div>

<div class="sidebar">
<h3>Trending</h3>
<p>• Everest tourism rising</p>
<p>• AI startups growing</p>
<p>• Cricket success story</p>
</div>

</div>

<footer>© 2026 Nepal NewsHub</footer>

</body>
</html>
